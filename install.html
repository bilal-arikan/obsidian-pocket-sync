<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Install Obsidian Pocket Sync</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 4rem auto;
           padding: 0 1rem; line-height: 1.6; color: #1f2330; }
    a.btn { display: inline-block; background: #7C3AED; color: #fff; padding: .7rem 1.2rem;
            border-radius: .5rem; text-decoration: none; font-weight: 600; }
    code { background: #f0f0f4; padding: .15rem .4rem; border-radius: .3rem; }
  </style>
  <!-- Custom-scheme redirects must be triggered by script; meta-refresh to a
       non-http scheme is blocked by most browsers. -->
  <script>
    var uri = "obsidian://brat?plugin=bilal-arikan/obsidian-pocket-sync";
    window.location.href = uri;
  </script>
</head>
<body>
  <h1>Opening Obsidian…</h1>
  <p>If nothing happened, make sure the
    <a href="https://github.com/TfTHacker/obsidian42-brat">BRAT</a> plugin is
    installed in Obsidian, then click the button below.</p>
  <p>
    <a class="btn" href="obsidian://brat?plugin=bilal-arikan/obsidian-pocket-sync">
      Add to Obsidian via BRAT
    </a>
  </p>
  <p>Or add it manually in BRAT with this repository:
    <code>bilal-arikan/obsidian-pocket-sync</code></p>
</body>
</html>

# fail2ban filter for Caddy JSON access logs — matches failed/limited auth
# attempts (PocketBase returns 400 on bad credentials; Caddy returns 429 when
# its rate_limit zone trips).
[Definition]

failregex = ^.*"remote_ip":"<HOST>".*"uri":"/api/collections/[^"]*/auth-with-password".*"status":(?:400|401|429)\b

# Caddy logs the timestamp as an epoch float, e.g. "ts":1719270000.1234
datepattern = "ts":{EPOCH}

ignoreregex =

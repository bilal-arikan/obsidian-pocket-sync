# Bans IPs that repeatedly fail or flood the PocketBase auth endpoint.
#
# chain=DOCKER-USER is REQUIRED: Caddy runs as a bridge container with published
# ports, so inbound traffic traverses FORWARD/DOCKER-USER, not INPUT. Banning in
# INPUT would have no effect on dockerized services.
[caddy-auth]
enabled  = true
filter   = caddy-auth
logpath  = /var/log/caddy/access.log
backend  = polling
maxretry = 10
findtime = 600
bantime  = 3600
action   = iptables-allports[name=caddy-auth, chain="DOCKER-USER"]

# Minimal PocketBase only — no TLS, exposes 8090 directly on the host.
# Use for local testing or behind your own proxy / VPN. For internet-facing
# mobile access prefer docker-compose.yml (Caddy + HTTPS).
#
#   docker compose -f docker-compose.simple.yml up -d --build
#   docker compose -f docker-compose.simple.yml exec pocketbase /pb/pocketbase superuser upsert "you@example.com" "<pass>"

services:
  pocketbase:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        PB_VERSION: ${PB_VERSION:-0.39.4}
    image: obsidian-pocketbase-sync:latest
    container_name: pocketbase
    restart: unless-stopped
    ports:
      - "8095:8090"
    volumes:
      - pb_data:/pb/pb_data

volumes:
  pb_data:
